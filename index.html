<!DOCTYPE html>
<html>
<head>
    <title>PlanPro AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
        button {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }
    </style>
</head>
<body>

<button id="arButton">Enter AR</button>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/webxr/ARButton.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

let camera, scene, renderer;
let controller;
let reticle;
let model;

init();

function init() {

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Light
    const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
    scene.add(light);

    // Load 3D model (your .glb file)
    const loader = new GLTFLoader();
    loader.load('chair.glb', function (gltf) {
        model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5);
    });

    // Reticle (placement indicator)
    const geometry = new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2);
    const material = new THREE.MeshBasicMaterial();
    reticle = new THREE.Mesh(geometry, material);
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // AR Button
    document.body.appendChild(
        ARButton.createButton(renderer, {
            requiredFeatures: ['hit-test']
        })
    );

    controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);

    renderer.setAnimationLoop(render);
}

function onSelect() {

    if (reticle.visible && model) {

        const placedModel = model.clone();
        placedModel.position.setFromMatrixPosition(reticle.matrix);
        scene.add(placedModel);
    }
}

let hitTestSource = null;
let localSpace = null;

async function render(timestamp, frame) {

    if (frame) {

        const referenceSpace = renderer.xr.getReferenceSpace();
        const session = renderer.xr.getSession();

        if (!hitTestSource) {

            const viewerSpace = await session.requestReferenceSpace('viewer');
            hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
            localSpace = await session.requestReferenceSpace('local');
        }

        const hitTestResults = frame.getHitTestResults(hitTestSource);

        if (hitTestResults.length > 0) {

            const hit = hitTestResults[0];
            const pose = hit.getPose(localSpace);

            reticle.visible = true;
            reticle.matrix.fromArray(pose.transform.matrix);

        } else {
            reticle.visible = false;
        }
    }

    renderer.render(scene, camera);
}

</script>
</body>
</html>
