<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Universe | Premium Stager</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050807;
      --surface: #0a120e;
      --glass: rgba(10, 18, 14, 0.9);
      --glass-border: rgba(227, 196, 141, 0.2);
      --accent: #e3c48d;
      --accent-glow: rgba(227, 196, 141, 0.4);
      --emerald: #1aa06d;
      --text: #f0f4f2;
      --muted: rgba(240, 244, 242, 0.5);
      --blur: blur(30px) saturate(1.8);
      --transition: cubic-bezier(0.23, 1, 0.32, 1);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
    }

    #landing {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column;
      background: var(--bg); transition: opacity 0.8s var(--transition);
      overflow-y: auto;
    }
    #landing.hidden { opacity: 0; pointer-events: none; }

    .hero-section {
      position: relative; padding: 100px 24px 60px;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; min-height: 85vh; justify-content: flex-end;
    }

    .hero-bg { position: absolute; inset: 0; z-index: -1; overflow: hidden; }
    .hero-image {
      position: absolute; inset: 0;
      background-image: url('ar_furniture_hero_1773244284518.png');
      background-size: cover; background-position: center;
      filter: brightness(0.4) contrast(1.1);
      transform: scale(1.1); animation: slowZoom 40s linear infinite alternate;
    }
    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
    }

    .brand-tag {
      font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin-bottom: 24px;
      padding: 10px 24px; border-radius: 40px;
      border: 1px solid var(--glass-border);
      background: var(--glass); backdrop-filter: var(--blur);
    }

    .landing h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 400; line-height: 1.1;
      margin-bottom: 24px;
    }
    .landing h1 em { color: var(--accent); font-style: italic; }

    .launch-btn {
      padding: 22px 52px; border-radius: 100px;
      background: var(--accent); border: none;
      color: #000; font-size: 17px; font-weight: 800;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;
      box-shadow: 0 15px 35px var(--accent-glow);
    }

    /* ── AR SCREEN ── */
    #ar-screen {
      position: fixed; inset: 0; z-index: 50; display: none;
    }
    #ar-screen.active { display: block; }

    #three-canvas { position: absolute; inset: 0; z-index: 2; }
    #camera-overlay { position: absolute; inset: 0; z-index: 1; overflow: hidden; background: #000; }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      padding: 50px 24px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }
    .btn-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); display: flex; align-items: center; justify-content: center;
      color: #fff; cursor: pointer;
    }

    .ar-status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); border-radius: 30px;
      padding: 30px; text-align: center; width: calc(100% - 48px); max-width: 320px; z-index: 20;
    }
    .ar-status.hidden { display: none; }

    .scan-ring {
      width: 60px; height: 60px; border: 3px solid rgba(227,196,141,0.1);
      border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .reticle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80px; height: 80px; pointer-events: none; opacity: 0; transition: 0.4s; z-index: 5;
    }
    .reticle.visible { opacity: 1; }

    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
      background: var(--glass); border-top: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); border-radius: 32px 32px 0 0;
      padding: 24px 28px 48px; transform: translateY(100%); transition: 0.6s var(--transition);
    }
    .bottom-panel.active { transform: translateY(0); }

    .action-btn {
      flex: 1; padding: 18px; border-radius: 30px;
      border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05);
      color: #fff; font-weight: 700; cursor: pointer;
    }
    .action-btn.primary { background: var(--accent); color: #000; border: none; }

    .product-scroller {
      position: absolute; bottom: 130px; left: 0; right: 0; z-index: 10;
      display: flex; gap: 12px; padding: 0 24px; overflow-x: auto;
      scrollbar-width: none;
    }
    .scroll-item {
      width: 56px; height: 56px; border-radius: 18px;
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; transition: 0.3s;
    }
    .scroll-item.active { border-color: var(--accent); transform: scale(1.1); }

    .toast {
      position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); padding: 12px 24px; border-radius: 20px;
      font-size: 14px; font-weight: 600; opacity: 0; transition: 0.4s;
      z-index: 200; pointer-events: none;
    }
    .toast.show { opacity: 1; top: 125px; }

    @media (min-width: 768px) {
      .bottom-panel { left: 50%; width: 500px; transform: translateX(-50%) translateY(100%); border-radius: 32px; margin-bottom: 24px; }
      .bottom-panel.active { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>

<body>
  <div id="landing">
    <div class="hero-section">
      <div class="hero-bg"><div class="hero-image"></div><div class="hero-gradient"></div></div>
      <div class="brand-tag">✦ AR Universe</div>
      <h1>Model-Perfect<br><em>Design</em>.</h1>
      <button class="launch-btn" id="launch-btn">Launch Experience</button>
    </div>
  </div>

  <div id="ar-screen">
    <div id="camera-overlay"></div>
    <canvas id="three-canvas"></canvas>
    
    <div class="top-bar">
      <button class="btn-icon" id="back-btn">✕</button>
      <span style="font-size:12px; font-weight:700; letter-spacing:4px">AR STUDIO</span>
      <button class="btn-icon">⚡</button>
    </div>

    <div class="ar-status" id="scan-status">
      <div class="scan-ring"></div>
      <div style="font-weight:700">Syncing Environment</div>
    </div>

    <div class="reticle" id="reticle-ui">
      <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" stroke="var(--accent)" stroke-width="0.5" stroke-dasharray="3 3"/><circle cx="32" cy="32" r="3" fill="var(--accent)"/></svg>
    </div>

    <div class="product-scroller" id="scroller"></div>

    <div class="bottom-panel" id="ui-panel">
      <div id="p-name" style="font-family:'Playfair Display',serif; font-size:26px">Sofa</div>
      <div id="p-price" style="font-size:18px; color:var(--accent); font-weight:700">₹45,000</div>
      <div style="display:flex; gap:12px; margin-top:20px">
        <button class="action-btn" id="rotate-obj">Rotate</button>
        <button class="action-btn" id="remove-obj">Remove</button>
        <button class="action-btn primary">Checkout</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast-msg"></div>

  <!-- Reliable CDN imports for Three.js and Loaders -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/loaders/DRACOLoader.js"></script>

  <script>
    const PRODUCTS = [
      { id:'sofa', name:'Velvet Elite Sofa', price:'₹45,000', model:'models/sofa-v1.glb', icon:'🛋️' },
      { id:'table', name:'Architect Table', price:'₹18,000', model:'models/study_table-v2.glb', icon:'🍽️' },
      { id:'bed', name:'Majestic Bed', price:'₹32,000', model:'models/single_bed-v1.glb', icon:'🛏️' },
      { id:'chair', name:'Gaming Chair', price:'₹22,000', model:'models/gaming_chair-v1.glb', icon:'🎮' }
    ];

    let selectedModel = PRODUCTS[0];
    let placedGroups = [];
    let currentSelection = null;
    let surfaceReady = false;

    // Loaders initialization
    const gltfLoader = new THREE.GLTFLoader();
    const dracoLoader = new THREE.DRACOLoader();
    // Using a reliable Google CDN for the Draco decoder binaries
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
    gltfLoader.setDRACOLoader(dracoLoader);

    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);
    scene.add(new THREE.AmbientLight(0xffffff, 1));
    const dl = new THREE.DirectionalLight(0xffffff, 0.8);
    dl.position.set(2, 5, 2);
    scene.add(dl);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(30,30), new THREE.MeshBasicMaterial({visible:false}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    const raycaster = new THREE.Raycaster();
    function getHit(x, y) {
      const r = canvas.getBoundingClientRect();
      const vx = ((x - r.left) / r.width) * 2 - 1;
      const vy = -((y - r.top) / r.height) * 2 + 1;
      raycaster.setFromCamera(new THREE.Vector2(vx, vy), camera);
      const hits = raycaster.intersectObject(floor);
      return hits.length ? hits[0].point : null;
    }

    function placeObj(x, y) {
      const pos = getHit(x, y);
      if (!pos) return;
      
      const targetUrl = selectedModel.model;
      showToast('⚡ LOADING...');
      
      gltfLoader.load(targetUrl, (gltf) => {
        const obj = gltf.scene;
        
        // Accurate floor-lock logic
        const box = new THREE.Box3().setFromObject(obj);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        // Center horizontally, lock bottom to Y=0
        obj.position.x += (pos.x - center.x);
        obj.position.y += (0 - box.min.y); 
        obj.position.z += (pos.z - center.z);
        
        // Intelligent auto-scaling
        const max = Math.max(size.x, size.y, size.z);
        if (max > 10) obj.scale.setScalar(0.01); 
        else if (max < 0.1) obj.scale.setScalar(10);

        scene.add(obj);
        placedGroups.push(obj);
        currentSelection = obj;
        updateUI();
        showToast('✓ Placed Successfully');
      }, undefined, (err) => {
        console.error('Loader Error:', err);
        showToast('⚠ Error loading ' + targetUrl.split('/').pop());
      });
    }

    function showToast(m) {
      const t = document.getElementById('toast-msg');
      t.textContent = m; t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function updateUI() {
      document.getElementById('ui-panel').classList.add('active');
      document.getElementById('p-name').textContent = selectedModel.name;
      document.getElementById('p-price').textContent = selectedModel.price;
    }

    document.getElementById('launch-btn').onclick = async () => {
      document.getElementById('landing').classList.add('hidden');
      document.getElementById('ar-screen').classList.add('active');
      const scroller = document.getElementById('scroller');
      scroller.innerHTML = '';
      PRODUCTS.forEach(p => {
        const item = document.createElement('div');
        item.className = 'scroll-item' + (p === selectedModel ? ' active' : '');
        item.textContent = p.icon;
        item.onclick = () => {
          selectedModel = p;
          document.querySelectorAll('.scroll-item').forEach(i => i.classList.remove('active'));
          item.classList.add('active');
        };
        scroller.appendChild(item);
      });
      onResize();
      try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'environment' } });
        const v = document.createElement('video');
        v.srcObject = s; v.autoplay = v.playsInline = true;
        v.style.cssText = 'position:absolute; inset:0; width:100%; height:100%; object-fit:cover;';
        document.getElementById('camera-overlay').appendChild(v);
      } catch(e) {}
      setTimeout(() => { document.getElementById('scan-status').classList.add('hidden'); document.getElementById('reticle-ui').classList.add('visible'); surfaceReady = true; }, 2000);
    };

    document.getElementById('back-btn').onclick = () => location.reload();
    
    document.getElementById('rotate-obj').onclick = () => {
      if (currentSelection) { currentSelection.rotation.y += Math.PI/4; }
    };
    document.getElementById('remove-obj').onclick = () => {
      if (placedGroups.length) {
        const o = placedGroups.pop();
        scene.remove(o);
        currentSelection = placedGroups[placedGroups.length-1] || null;
        if (!currentSelection) document.getElementById('ui-panel').classList.remove('active');
        showToast('🗑 Object Removed');
      }
    };

    canvas.addEventListener('click', e => { if (surfaceReady) placeObj(e.clientX, e.clientY); });
    function onResize() { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); }
    window.addEventListener('resize', onResize);
    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
    animate();
  </script>
</body>
</html>
